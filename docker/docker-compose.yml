services:
  postgres:
    image: postgres:15
    container_name: mailmind-postgres
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: ${POSTGRES_DB:-mailmind}
      POSTGRES_USER: ${POSTGRES_USER:-mailmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mailmind}
    ports:
      - "5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mailmind-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data
